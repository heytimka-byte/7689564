<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>приглашение</title>
</head>
<body>
    <div class="my-box"></div>
<h1>пойдешь со мной на свиданку?</h1>

<div class="gif">
    <img src="img/123.gif" alt="gif"  style="position: relative; left: 770px; top: 140px; width: 370px; border-radius: 20px;">
</div>

<div class="button">
  <a href="date.html"><button class="btn-yes" style="border-radius:20px; padding: 20px 40px;">да</button></a>
    <button class="btn-no" style="border-radius:20px; padding: 20px 40px;">нет</button>
</div>

<script>
    const buttonNo = document.querySelector('.btn-no');

    buttonNo.addEventListener('mouseover', function() {
       const randomX = Math.random() * 500;
         const randomY = Math.random() * 500;
         
         buttonNo.style.left = randomX + 'px';
         buttonNo.style.top = randomY + 'px';
    });
</script>
</body>
