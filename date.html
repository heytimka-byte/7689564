<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Выбери день</title>
</head>
<body>
    <div class="box2"></div>
    <div class="hik">
<h1>Какая дата?)</h1>
</div>
<div class="calendar-container">
    <input type="date" class="my-calendar">
</div>
<div class="ok">
    <button class="btn-ok">выбрала</button>
</div>
    <script>
        const btnOk = document.querySelector('.btn-ok');
        const calendar = document.querySelector('.my-calendar');

        btnOk.addEventListener('click', function() {
            if (calendar.value) {
                const telegramUrl = `https://t.me/kurgamik?text=привет! Я выбрала день для свидания: ${calendar.value}`;
                window.open(telegramUrl, '_blank');
                window.location.href = 'final.html';
            } else {
                alert('Select date!');
            }
        });
    </script>
       
            

</body> 
</html>
